spring:
  application:
    name: Tablon-de-empleos-backend

  # Base de Datos
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 10
          lob:
            non_contextual_creation: true

  # Archivos y Multipart
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# URL base para enlaces en emails
app:
  base-url: ${APP_BASE_URL}

# Gestión de imágenes en la nube
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Configuración de Resend (Email API)
resend:
  api:
    key: ${RESEND_API_KEY}
  from:
    email: ${RESEND_FROM_EMAIL}

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# Usuario Maestro (ADMIN)
ADMIN_USER: ${ADMIN_USER}
ADMIN_PASS: ${ADMIN_PASS}
ADMIN_EMAIL: ${ADMIN_EMAIL}
ADMIN_FOTO_URL: ${ADMIN_FOTO_URL}
ADMIN_NAME: ${ADMIN_NAME}
ADMIN_APELLIDO: ${ADMIN_APELLIDO}

# Configuración del servidor para Render
server:
  port: ${PORT:8080}
  error:
    include-message: always